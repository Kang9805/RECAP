name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          grep -vE '^(paddleocr|paddlepaddle)==' requirements.txt > requirements-ci.txt
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run Django tests
        env:
          SECRET_KEY: test-secret-key
          DEBUG: False
        run: python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: SSH into VM and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.GCP_VM_REPO_PATH }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Rebuilding and restarting containers..."
            docker compose up -d --build

            # Ensure nginx picks up current web container DNS/IP after recreate.
            docker compose restart nginx

            echo "==> Waiting for health check..."
            for i in {1..20}; do
              if curl -fsS -H "Host: ${{ secrets.GCP_VM_HOST }}" http://127.0.0.1/ >/dev/null; then
                echo "Health check passed"
                exit 0
              fi
              sleep 3
            done

            echo "Health check failed"
            docker compose ps
            docker compose logs --tail=80 web nginx
            exit 1
