server {
    listen 80;
    server_name recap.o-r.kr www.recap.o-r.kr;

    # Certbot HTTP-01 challenge path.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name recap.o-r.kr www.recap.o-r.kr;

    ssl_certificate /etc/letsencrypt/live/recap.o-r.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recap.o-r.kr/privkey.pem;

    # Docker embedded DNS for service-name resolution.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # 업로드 파일 크기 제한 (영수증 이미지)
    client_max_body_size 20M;

    # 정적 파일
    location /static/ {
        alias /app/staticfiles/;
    }

    # 미디어 파일 (업로드된 영수증 이미지)
    location /media/ {
        alias /app/media/;
    }

    # Django 앱
    location / {
        set $django_upstream http://web:8000;
        proxy_pass $django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
