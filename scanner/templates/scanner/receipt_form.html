<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영수증 업로드</title>
    <style>
        :root {
            --ink: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;
            --brand: #0f766e;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.09);
            --radius-xl: 18px;
            --radius-md: 12px;
            --radius-sm: 10px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 32px 16px 40px;
            color: var(--ink);
            font-family: "Pretendard", "SUIT", "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at 14% 18%, #d1fae5 0%, rgba(209, 250, 229, 0) 45%),
                radial-gradient(circle at 86% 2%, #fef3c7 0%, rgba(254, 243, 199, 0) 40%),
                linear-gradient(160deg, #f8fafc 0%, #eef2ff 50%, #f8fafc 100%);
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.85);
            padding: 28px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
        }
        h1 {
            margin: 0;
            font-size: clamp(26px, 3.2vw, 34px);
            letter-spacing: -0.03em;
            text-align: center;
        }
        .lead {
            margin: 8px 0 22px;
            text-align: center;
            color: var(--muted);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 700;
            color: #374151;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: var(--radius-sm);
            background: #fff;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--brand) 0%, #14b8a6 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(20, 184, 166, 0.24);
            transition: transform .15s ease, box-shadow .15s ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 24px rgba(20, 184, 166, 0.3);
        }
        .links {
            margin-top: 20px;
            text-align: center;
        }
        a {
            color: var(--brand);
            text-decoration: none;
            margin: 0 10px;
            font-weight: 700;
        }
        a:hover {
            text-decoration: underline;
        }
        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>영수증 업로드</h1>
        <p class="lead">이미지를 업로드하면 OCR 처리가 백그라운드에서 자동으로 시작됩니다.</p>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_image">이미지 선택:</label>
                {{ form.image }}
            </div>
            <button type="submit">업로드</button>
        </form>
        <div class="links">
            <a href="{% url 'receipt-list' %}">목록으로 돌아가기</a>
        </div>
    </div>
</body>
</html>
