version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: recap
      POSTGRES_USER: recap_user
      POSTGRES_PASSWORD: recap_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: recap
      DATABASE_USER: recap_user
      DATABASE_PASSWORD: recap_pass
      DATABASE_PORT: "5432"

volumes:
  postgres_data:
